<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кладовочник 2.0: Бабы-Зомби</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏪 КЛАДОВОЧНИК 2.0</h1>
            <h2>🧟‍♀️ Бабы-Зомби</h2>
            <p class="subtitle">Открывай ПВЗ в Петрозаводске и выживай среди шопоголиков</p>
        </header>

        <div class="stats-panel">
            <div class="stat">
                <span class="stat-label">📅 Месяц</span>
                <span id="month" class="stat-value">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">💰 Баланс</span>
                <span id="money" class="stat-value">500 000 ₽</span>
            </div>
            <div class="stat">
                <span class="stat-label">🏪 ПВЗ в городе</span>
                <span id="city-pvz" class="stat-value">12</span>
            </div>
            <div class="stat">
                <span class="stat-label">🧟‍♀️ Баб</span>
                <span id="zombies" class="stat-value">0</span>
            </div>
        </div>

        <div id="market-section" class="section">
            <h3>🏪 Рынок кладовок</h3>
            <div id="market-list" class="card-list"></div>
        </div>

        <div id="storages-section" class="section">
            <h3>📦 Мои кладовки</h3>
            <div id="storages-list" class="card-list"></div>
        </div>

        <div id="events-section" class="section hidden">
            <h3>📢 События месяца</h3>
            <div id="events-list"></div>
        </div>

        <div class="actions">
            <button id="btn-market" class="btn btn-primary">🏪 Рынок</button>
            <button id="btn-storages" class="btn btn-secondary">📦 Мои кладовки</button>
            <button id="btn-next" class="btn btn-danger">📅 След. месяц</button>
            <button id="btn-restart" class="btn btn-secondary">🔄 С начала</button>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
